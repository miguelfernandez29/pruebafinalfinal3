<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Asset Management</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>New Vehicle</h2>

        <form th:action="@{/assets/vehicles/save}" th:object="${vehicle}" method="post">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Presentation Year</label>
                    <input type="number" class="form-control" th:field="*{presentationYear}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Tax Type Code</label>
                    <input type="text" class="form-control" th:field="*{taxTypeCode}" maxlength="2" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Presentation Code</label>
                    <input type="text" class="form-control" th:field="*{presentationCode}" maxlength="14" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Cause NIF</label>
                    <input type="text" class="form-control" th:field="*{causeNif}" maxlength="9" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Sub Cause Code</label>
                    <input type="text" class="form-control" th:field="*{subCauseCode}" maxlength="2" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Asset Sequence</label>
                    <input type="number" class="form-control" th:field="*{assetSequence}" required>
                </div>
            </div>

            <h4 class="mt-3">Vehicle Details</h4>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">License Plate</label>
                    <input type="text" class="form-control" th:field="*{licensePlate}" maxlength="10">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Registration Date</label>
                    <input type="date" class="form-control" th:field="*{registrationDate}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Vehicle Type Code</label>
                    <input type="text" class="form-control" th:field="*{vehicleTypeCode}" maxlength="2">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Vehicle Brand Code</label>
                    <input type="text" class="form-control" th:field="*{vehicleBrandCode}" maxlength="4">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Vehicle Brand Description</label>
                    <input type="text" class="form-control" th:field="*{vehicleBrandDescription}" maxlength="50">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Vehicle Model Code</label>
                    <input type="text" class="form-control" th:field="*{vehicleModelCode}" maxlength="10">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Vehicle Model Description</label>
                    <input type="text" class="form-control" th:field="*{vehicleModelDescription}" maxlength="100">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Catalog Date</label>
                    <input type="date" class="form-control" th:field="*{catalogDate}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Participation %</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{participationPercentage}">
                </div>
            </div>

            <h4 class="mt-3">Valuation</h4>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Catalog Value</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{catalogValue}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Depreciation %</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{depreciationPercentage}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Declared Value</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{declaredValue}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Verified Value</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{verifiedValue}" readonly>
                </div>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/assets/vehicles}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
