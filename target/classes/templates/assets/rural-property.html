<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bien Rustico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">GTLIA20900</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/assets}">Bienes</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Bien Rustico</h2>
        
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <span th:text="${errorMessage}"></span>
        </div>
        
        <form th:action="@{/assets/rural/save}" th:object="${ruralProperty}" method="post" class="mt-3">
            <input type="hidden" th:field="*{presentationYear}">
            <input type="hidden" th:field="*{taxType}">
            <input type="hidden" th:field="*{presentationCode}">
            <input type="hidden" th:field="*{taxpayerNif}">
            <input type="hidden" th:field="*{assetSequence}">
            
            <fieldset class="border p-3 mb-3">
                <legend class="w-auto px-2">Ubicacion</legend>
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="provinceCode" class="form-label">Provincia</label>
                            <select class="form-select" id="provinceCode" th:field="*{provinceCode}">
                                <option value="">Seleccione...</option>
                                <option th:each="province : ${provinces}" th:value="${province.provinceCode}" th:text="${province.provinceDescription}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="municipalityCode" class="form-label">Municipio</label>
                            <input type="text" class="form-control" id="municipalityCode" th:field="*{municipalityCode}" maxlength="3">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="locationName" class="form-label">Paraje</label>
                            <input type="text" class="form-control" id="locationName" th:field="*{locationName}" maxlength="100">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="polygon" class="form-label">Poligono</label>
                            <input type="text" class="form-control" id="polygon" th:field="*{polygon}" maxlength="10">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="parcel" class="form-label">Parcela</label>
                            <input type="text" class="form-control" id="parcel" th:field="*{parcel}" maxlength="10">
                        </div>
                    </div>
                </div>
            </fieldset>
            
            <fieldset class="border p-3 mb-3">
                <legend class="w-auto px-2">Datos del Bien</legend>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="cadastralReference" class="form-label">Referencia Catastral</label>
                            <input type="text" class="form-control" id="cadastralReference" th:field="*{cadastralReference}" maxlength="14">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="propertyTypeCode" class="form-label">Tipo Bien</label>
                            <select class="form-select" id="propertyTypeCode" th:field="*{propertyTypeCode}">
                                <option value="">Seleccione...</option>
                                <option th:each="type : ${propertyTypes}" th:value="${type.propertyTypeCode}" th:text="${type.propertyTypeDescription}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="surfaceArea" class="form-label">Superficie</label>
                            <input type="number" step="0.0001" class="form-control" id="surfaceArea" th:field="*{surfaceArea}">
                        </div>
                    </div>
                </div>
            </fieldset>
            
            <fieldset class="border p-3 mb-3">
                <legend class="w-auto px-2">Valores</legend>
                <div class="row">
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="declaredValue" class="form-label">Valor Declarado</label>
                            <input type="number" step="0.01" class="form-control" id="declaredValue" th:field="*{declaredValue}">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="verifiedValue" class="form-label">Valor Comprobado</label>
                            <input type="number" step="0.01" class="form-control" id="verifiedValue" th:field="*{verifiedValue}">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="referenceValue" class="form-label">Valor Referencia</label>
                            <input type="number" step="0.01" class="form-control" id="referenceValue" th:field="*{referenceValue}" readonly>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="conformityIndicator" class="form-label">Conforme</label>
                            <input type="text" class="form-control" id="conformityIndicator" th:field="*{conformityIndicator}" readonly>
                        </div>
                    </div>
                </div>
            </fieldset>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Aceptar</button>
                <a th:href="@{/assets}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
