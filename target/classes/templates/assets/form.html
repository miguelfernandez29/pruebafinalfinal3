<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Bien</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">GTLIA20900</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/assets}">Bienes</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Nuevo Bien</h2>
        
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <span th:text="${errorMessage}"></span>
        </div>
        
        <form th:action="@{/assets/save}" th:object="${assetCause}" method="post" class="mt-3">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="presentationYear" class="form-label">Ano Presentacion *</label>
                        <input type="number" class="form-control" id="presentationYear" th:field="*{presentationYear}" required>
                        <div th:if="${#fields.hasErrors('presentationYear')}" class="text-danger" th:errors="*{presentationYear}"></div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="taxType" class="form-label">Tipo Impuesto *</label>
                        <input type="text" class="form-control" id="taxType" th:field="*{taxType}" maxlength="2" required>
                        <div th:if="${#fields.hasErrors('taxType')}" class="text-danger" th:errors="*{taxType}"></div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="presentationCode" class="form-label">Codigo Presentacion *</label>
                        <input type="text" class="form-control" id="presentationCode" th:field="*{presentationCode}" maxlength="14" required>
                        <div th:if="${#fields.hasErrors('presentationCode')}" class="text-danger" th:errors="*{presentationCode}"></div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="taxpayerNif" class="form-label">NIF Causante *</label>
                        <input type="text" class="form-control" id="taxpayerNif" th:field="*{taxpayerNif}" maxlength="9" required>
                        <div th:if="${#fields.hasErrors('taxpayerNif')}" class="text-danger" th:errors="*{taxpayerNif}"></div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="assetNatureCode" class="form-label">Naturaleza *</label>
                        <select class="form-select" id="assetNatureCode" th:field="*{assetNatureCode}" required>
                            <option value="">Seleccione...</option>
                            <option th:each="nature : ${assetNatures}" th:value="${nature.dataCode}" th:text="${nature.description}"></option>
                        </select>
                        <div th:if="${#fields.hasErrors('assetNatureCode')}" class="text-danger" th:errors="*{assetNatureCode}"></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="assetPositionCode" class="form-label">Posicion (P/G) *</label>
                        <select class="form-select" id="assetPositionCode" th:field="*{assetPositionCode}" required>
                            <option value="">Seleccione...</option>
                            <option th:each="position : ${assetPositions}" th:value="${position.dataCode}" th:text="${position.description}"></option>
                        </select>
                        <div th:if="${#fields.hasErrors('assetPositionCode')}" class="text-danger" th:errors="*{assetPositionCode}"></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="transmissionPercentage" class="form-label">% Transmision</label>
                        <input type="number" step="0.01" min="0" max="100" class="form-control" id="transmissionPercentage" th:field="*{transmissionPercentage}">
                        <div th:if="${#fields.hasErrors('transmissionPercentage')}" class="text-danger" th:errors="*{transmissionPercentage}"></div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="declaredValue" class="form-label">Valor Declarado</label>
                        <input type="number" step="0.01" class="form-control" id="declaredValue" th:field="*{declaredValue}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="verifiedValue" class="form-label">Valor Comprobado</label>
                        <input type="number" step="0.01" class="form-control" id="verifiedValue" th:field="*{verifiedValue}">
                    </div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a th:href="@{/assets}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
