<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Causes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Asset Management</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" th:href="@{/assets}">Assets</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/assets/urban}">Urban</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/assets/rustic}">Rustic</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/assets/vehicles}">Vehicles</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Asset Causes</h2>
            <a th:href="@{/assets/new}" class="btn btn-success">New Asset</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Year</th>
                        <th>Tax Type</th>
                        <th>Presentation</th>
                        <th>Cause NIF</th>
                        <th>Sequence</th>
                        <th>Nature</th>
                        <th>Type</th>
                        <th>Declared Value</th>
                        <th>Verified Value</th>
                        <th>Conformity</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="asset : ${assetCauses}">
                        <td th:text="${asset.presentationYear}"></td>
                        <td th:text="${asset.taxTypeCode}"></td>
                        <td th:text="${asset.presentationCode}"></td>
                        <td th:text="${asset.causeNif}"></td>
                        <td th:text="${asset.assetSequence}"></td>
                        <td th:text="${asset.assetNatureCode}"></td>
                        <td th:text="${asset.assetTypeCode}"></td>
                        <td th:text="${#numbers.formatDecimal(asset.declaredValue, 1, 2)}"></td>
                        <td th:text="${#numbers.formatDecimal(asset.verifiedValue, 1, 2)}"></td>
                        <td>
                            <span th:if="${asset.conformityIndicator == 'S'}" class="badge bg-success">Conforme</span>
                            <span th:if="${asset.conformityIndicator == 'N'}" class="badge bg-warning">No Conforme</span>
                        </td>
                        <td>
                            <a th:href="@{/assets/edit/{y}/{t}/{p}/{n}/{s}/{seq}(y=${asset.presentationYear},t=${asset.taxTypeCode},p=${asset.presentationCode},n=${asset.causeNif},s=${asset.subCauseCode},seq=${asset.assetSequence})}" 
                               class="btn btn-sm btn-primary">Edit</a>
                            <a th:href="@{/assets/delete/{y}/{t}/{p}/{n}/{s}/{seq}(y=${asset.presentationYear},t=${asset.taxTypeCode},p=${asset.presentationCode},n=${asset.causeNif},s=${asset.subCauseCode},seq=${asset.assetSequence})}" 
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Are you sure you want to delete this asset?')">Delete</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(assetCauses)}">
                        <td colspan="11" class="text-center">No assets found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
