<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rustic Property Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Asset Management</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>New Rustic Property</h2>

        <form th:action="@{/assets/rustic/save}" th:object="${rusticProperty}" method="post">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Presentation Year</label>
                    <input type="number" class="form-control" th:field="*{presentationYear}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Tax Type Code</label>
                    <input type="text" class="form-control" th:field="*{taxTypeCode}" maxlength="2" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Presentation Code</label>
                    <input type="text" class="form-control" th:field="*{presentationCode}" maxlength="14" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Cause NIF</label>
                    <input type="text" class="form-control" th:field="*{causeNif}" maxlength="9" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Sub Cause Code</label>
                    <input type="text" class="form-control" th:field="*{subCauseCode}" maxlength="2" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Asset Sequence</label>
                    <input type="number" class="form-control" th:field="*{assetSequence}" required>
                </div>
            </div>

            <h4 class="mt-3">Location</h4>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Cadastral Reference</label>
                    <input type="text" class="form-control" th:field="*{cadastralReference}" maxlength="20">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Province Code</label>
                    <input type="text" class="form-control" th:field="*{provinceCode}" maxlength="2">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Municipality Code</label>
                    <input type="text" class="form-control" th:field="*{municipalityCode}" maxlength="3">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Location Name</label>
                    <input type="text" class="form-control" th:field="*{locationName}" maxlength="100">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Polygon</label>
                    <input type="text" class="form-control" th:field="*{polygon}" maxlength="10">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Parcel</label>
                    <input type="text" class="form-control" th:field="*{parcel}" maxlength="10">
                </div>
            </div>

            <h4 class="mt-3">Property Details</h4>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Property Type Code</label>
                    <input type="text" class="form-control" th:field="*{propertyTypeCode}" maxlength="3">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Surface Area (Ha)</label>
                    <input type="number" step="0.0001" class="form-control" th:field="*{surfaceArea}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Participation %</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{participationPercentage}">
                </div>
            </div>

            <h4 class="mt-3">Valuation</h4>
            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Declared Value</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{declaredValue}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Verified Value</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{verifiedValue}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Reference Value</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{referenceValue}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Cadastral Value</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{cadastralValue}">
                </div>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/assets/rustic}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
