<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Asset Management</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 th:text="${isEdit} ? 'Edit Asset' : 'New Asset'">Asset Form</h2>

        <form th:action="${isEdit} ? @{/assets/update/{y}/{t}/{p}/{n}/{s}/{seq}(y=${assetCause.presentationYear},t=${assetCause.taxTypeCode},p=${assetCause.presentationCode},n=${assetCause.causeNif},s=${assetCause.subCauseCode},seq=${assetCause.assetSequence})} : @{/assets/save}" 
              th:object="${assetCause}" method="post">
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Presentation Year</label>
                    <input type="number" class="form-control" th:field="*{presentationYear}" required>
                    <div th:if="${#fields.hasErrors('presentationYear')}" class="text-danger" th:errors="*{presentationYear}"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Tax Type Code</label>
                    <input type="text" class="form-control" th:field="*{taxTypeCode}" maxlength="2" required>
                    <div th:if="${#fields.hasErrors('taxTypeCode')}" class="text-danger" th:errors="*{taxTypeCode}"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Presentation Code</label>
                    <input type="text" class="form-control" th:field="*{presentationCode}" maxlength="14" required>
                    <div th:if="${#fields.hasErrors('presentationCode')}" class="text-danger" th:errors="*{presentationCode}"></div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Cause NIF</label>
                    <input type="text" class="form-control" th:field="*{causeNif}" maxlength="9" required>
                    <div th:if="${#fields.hasErrors('causeNif')}" class="text-danger" th:errors="*{causeNif}"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Sub Cause Code</label>
                    <input type="text" class="form-control" th:field="*{subCauseCode}" maxlength="2" required>
                    <div th:if="${#fields.hasErrors('subCauseCode')}" class="text-danger" th:errors="*{subCauseCode}"></div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Asset Sequence</label>
                    <input type="number" class="form-control" th:field="*{assetSequence}" th:readonly="${isEdit}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Asset Nature Code</label>
                    <select class="form-select" th:field="*{assetNatureCode}">
                        <option value="">Select...</option>
                        <option value="U">Urban (U)</option>
                        <option value="R">Rustic (R)</option>
                        <option value="A">Business Activity (A)</option>
                        <option value="T">Other (T)</option>
                        <option value="C">Bank Account (C)</option>
                        <option value="V">Listed Securities (V)</option>
                        <option value="N">Unlisted Securities (N)</option>
                        <option value="G">Vehicle (G)</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Asset Position Code</label>
                    <select class="form-select" th:field="*{assetPositionCode}">
                        <option value="">Select...</option>
                        <option value="P">P - Pleno Dominio</option>
                        <option value="G">G - Gananciales</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Transmission Percentage</label>
                    <input type="number" step="0.01" min="0" max="100" class="form-control" th:field="*{transmissionPercentage}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Asset Type Code</label>
                    <input type="text" class="form-control" th:field="*{assetTypeCode}" maxlength="3">
                </div>
                <div class="col-md-8 mb-3">
                    <label class="form-label">Asset Type Description</label>
                    <input type="text" class="form-control" th:field="*{assetTypeDescription}" maxlength="100">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Declared Value</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{declaredValue}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Verified Value</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{verifiedValue}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Reference Value</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{referenceValue}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label">Conformity</label>
                    <select class="form-select" th:field="*{conformityIndicator}">
                        <option value="">Select...</option>
                        <option value="S">Yes (S)</option>
                        <option value="N">No (N)</option>
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Reduction</label>
                    <select class="form-select" th:field="*{reductionIndicator}">
                        <option value="">Select...</option>
                        <option value="S">Yes (S)</option>
                        <option value="N">No (N)</option>
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Reference Value Indicator</label>
                    <select class="form-select" th:field="*{referenceValueIndicator}">
                        <option value="">Select...</option>
                        <option value="S">Yes (S)</option>
                        <option value="N">No (N)</option>
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Business Affected</label>
                    <select class="form-select" th:field="*{businessAffectedIndicator}">
                        <option value="">Select...</option>
                        <option value="S">Yes (S)</option>
                        <option value="N">No (N)</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/assets}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
