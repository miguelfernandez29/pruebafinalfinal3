<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Bienes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">GTLIA20900</a>
            <div class="navbar-nav">
                <a class="nav-link active" th:href="@{/assets}">Bienes</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Lista de Bienes</h2>
            <a th:href="@{/assets/new}" class="btn btn-success">
                <i class="bi bi-plus"></i> Nuevo Bien
            </a>
        </div>
        
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Secuencia</th>
                        <th>Naturaleza</th>
                        <th>Posicion</th>
                        <th>% Transmision</th>
                        <th>Valor Declarado</th>
                        <th>Valor Comprobado</th>
                        <th>Conforme</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="asset : ${assets}">
                        <td th:text="${asset.assetSequence}"></td>
                        <td th:text="${asset.assetNatureDescription}"></td>
                        <td th:text="${asset.assetPositionDescription}"></td>
                        <td th:text="${asset.transmissionPercentage}"></td>
                        <td th:text="${#numbers.formatDecimal(asset.declaredValue, 0, 'COMMA', 2, 'POINT')}"></td>
                        <td th:text="${#numbers.formatDecimal(asset.verifiedValue, 0, 'COMMA', 2, 'POINT')}"></td>
                        <td>
                            <span th:if="${asset.conformityIndicator == 'S'}" class="badge bg-success">Si</span>
                            <span th:if="${asset.conformityIndicator == 'N'}" class="badge bg-danger">No</span>
                        </td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <a th:if="${asset.assetNatureCode == 'U'}" 
                                   th:href="@{/assets/urban/{py}/{tt}/{pc}/{tn}/{as}(py=${asset.presentationYear},tt=${asset.taxType},pc=${asset.presentationCode},tn=${asset.taxpayerNif},as=${asset.assetSequence})}" 
                                   class="btn btn-outline-primary">Editar</a>
                                <a th:if="${asset.assetNatureCode == 'R'}" 
                                   th:href="@{/assets/rural/{py}/{tt}/{pc}/{tn}/{as}(py=${asset.presentationYear},tt=${asset.taxType},pc=${asset.presentationCode},tn=${asset.taxpayerNif},as=${asset.assetSequence})}" 
                                   class="btn btn-outline-primary">Editar</a>
                                <a th:if="${asset.assetNatureCode == 'G'}" 
                                   th:href="@{/assets/vehicle/{py}/{tt}/{pc}/{tn}/{as}(py=${asset.presentationYear},tt=${asset.taxType},pc=${asset.presentationCode},tn=${asset.taxpayerNif},as=${asset.assetSequence})}" 
                                   class="btn btn-outline-primary">Editar</a>
                                <a th:href="@{/assets/delete/{py}/{tt}/{pc}/{tn}/{as}(py=${asset.presentationYear},tt=${asset.taxType},pc=${asset.presentationCode},tn=${asset.taxpayerNif},as=${asset.assetSequence})}" 
                                   class="btn btn-outline-danger"
                                   onclick="return confirm('¿Esta seguro de eliminar este bien?')">Eliminar</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(assets)}">
                        <td colspan="8" class="text-center">No hay bienes registrados</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
