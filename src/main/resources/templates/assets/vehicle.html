<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehiculo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">GTLIA20900</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/assets}">Bienes</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Vehiculo</h2>
        
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <span th:text="${errorMessage}"></span>
        </div>
        
        <form th:action="@{/assets/vehicle/save}" th:object="${vehicle}" method="post" class="mt-3">
            <input type="hidden" th:field="*{presentationYear}">
            <input type="hidden" th:field="*{taxType}">
            <input type="hidden" th:field="*{presentationCode}">
            <input type="hidden" th:field="*{taxpayerNif}">
            <input type="hidden" th:field="*{assetSequence}">
            
            <fieldset class="border p-3 mb-3">
                <legend class="w-auto px-2">Datos del Vehiculo</legend>
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="registrationDate" class="form-label">Fecha Matriculacion</label>
                            <input type="date" class="form-control" id="registrationDate" th:field="*{registrationDate}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="vehicleTypeCode" class="form-label">Tipo Vehiculo</label>
                            <input type="text" class="form-control" id="vehicleTypeCode" th:field="*{vehicleTypeCode}" maxlength="2">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="vehicleTypeDescription" class="form-label">Descripcion Tipo</label>
                            <input type="text" class="form-control" id="vehicleTypeDescription" th:field="*{vehicleTypeDescription}" readonly>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="vehicleBrandCode" class="form-label">Codigo Marca</label>
                            <input type="text" class="form-control" id="vehicleBrandCode" th:field="*{vehicleBrandCode}" maxlength="4">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="vehicleBrandDescription" class="form-label">Marca</label>
                            <input type="text" class="form-control" id="vehicleBrandDescription" th:field="*{vehicleBrandDescription}" readonly>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="vehicleModelCode" class="form-label">Codigo Modelo</label>
                            <input type="text" class="form-control" id="vehicleModelCode" th:field="*{vehicleModelCode}" maxlength="10">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="vehicleModelAbbreviation" class="form-label">Modelo</label>
                            <input type="text" class="form-control" id="vehicleModelAbbreviation" th:field="*{vehicleModelAbbreviation}" readonly>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="engineDisplacementCc" class="form-label">Cilindrada (cc)</label>
                            <input type="number" class="form-control" id="engineDisplacementCc" th:field="*{engineDisplacementCc}" readonly>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="catalogValue" class="form-label">Valor Catalogo</label>
                            <input type="number" step="0.01" class="form-control" id="catalogValue" th:field="*{catalogValue}" readonly>
                        </div>
                    </div>
                </div>
            </fieldset>
            
            <fieldset class="border p-3 mb-3">
                <legend class="w-auto px-2">Valores</legend>
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="declaredValue" class="form-label">Valor Declarado</label>
                            <input type="number" step="0.01" class="form-control" id="declaredValue" th:field="*{declaredValue}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="verifiedValue" class="form-label">Valor Comprobado</label>
                            <input type="number" step="0.01" class="form-control" id="verifiedValue" th:field="*{verifiedValue}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="conformityIndicator" class="form-label">Conforme</label>
                            <input type="text" class="form-control" id="conformityIndicator" th:field="*{conformityIndicator}" readonly>
                        </div>
                    </div>
                </div>
            </fieldset>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Aceptar</button>
                <a th:href="@{/assets}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
